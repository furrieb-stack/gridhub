databases:
  - name: gridhub-db
    databaseName: gridhub
    user: gridhub
    plan: free
    region: oregon

services:
  - type: redis
    name: gridhub-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction

  - type: web
    name: gridhub
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gridhub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: gridhub-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: TZ
        value: Europe/Moscow